spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/jobela
    username: jobela
    password: jobela
    driver-class-name: org.postgresql.Driver

  flyway:
    validate-migration-naming: true
    enabled: true
    url: jdbc:postgresql://127.0.0.1:5433/jobela
    user: jobela
    password: jobela

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION:86400000}